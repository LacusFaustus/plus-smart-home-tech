spring.datasource.url=jdbc:postgresql://postgres:5432/smarthome
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=cart_db
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.hbm2ddl.auto=create
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
server.port=8082
eureka.client.serviceUrl.defaultZone=http://discovery-server:8761/eureka/
resilience4j.circuitbreaker.instances.warehouseService.sliding-window-size=10
resilience4j.circuitbreaker.instances.warehouseService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.warehouseService.wait-duration-in-open-state=10000
resilience4j.circuitbreaker.instances.warehouseService.permitted-number-of-calls-in-half-open-state=3