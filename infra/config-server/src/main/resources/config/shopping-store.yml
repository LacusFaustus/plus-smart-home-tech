spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/smarthome?currentSchema=store_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: store_db
    show-sql: true