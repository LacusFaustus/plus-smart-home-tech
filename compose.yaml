   services:
    # ===== ИНФРАСТРУКТУРА =====
    postgres:
      image: postgres:15
      container_name: postgres
      ports:
        - "5432:5432"
      environment:
        POSTGRES_DB: smarthome
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
      volumes:
        - postgres-data:/var/lib/postgresql/data
        - ./commerce/schemas.sql:/docker-entrypoint-initdb.d/01-schemas.sql
      restart: unless-stopped
      healthcheck:
        test: [ "CMD-SHELL", "pg_isready -U postgres" ]
        interval: 10s
        timeout: 5s
        retries: 5
      networks:
        - smart-home-network

    discovery-server:
      build: ./infra/discovery-server
      container_name: discovery-server
      ports:
        - "8761:8761"
      environment:
        - SPRING_PROFILES_ACTIVE=default
      restart: unless-stopped
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
        interval: 30s
        timeout: 10s
        retries: 5
      networks:
        - smart-home-network

    config-server:
      build: ./infra/config-server
      container_name: config-server
      depends_on:
        discovery-server:
          condition: service_healthy
      ports:
        - "8888:8888"
      environment:
        - SPRING_PROFILES_ACTIVE=native
        - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      restart: unless-stopped
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
        interval: 30s
        timeout: 10s
        retries: 5
      networks:
        - smart-home-network

    gateway:
      build: ./infra/gateway
      container_name: gateway
      depends_on:
        discovery-server:
          condition: service_healthy
        config-server:
          condition: service_healthy
      ports:
        - "8080:8080"
      environment:
        - SPRING_PROFILES_ACTIVE=default
        - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
        - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      restart: unless-stopped
      networks:
        - smart-home-network

    # ===== СЕРВИСЫ КОММЕРЦИИ =====
    warehouse:
      build: ./commerce/warehouse
      container_name: warehouse
      depends_on:
        discovery-server:
          condition: service_healthy
        config-server:
          condition: service_healthy
        postgres:
          condition: service_healthy
      ports:
        - "8081"
      environment:
        - SPRING_PROFILES_ACTIVE=default
        - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
        - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      restart: unless-stopped
      networks:
        - smart-home-network

    shopping-cart:
      build: ./commerce/shopping-cart
      container_name: shopping-cart
      depends_on:
        discovery-server:
          condition: service_healthy
        config-server:
          condition: service_healthy
        postgres:
          condition: service_healthy
        warehouse:
          condition: service_started
      ports:
        - "8082"
      environment:
        - SPRING_PROFILES_ACTIVE=default
        - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
        - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      restart: unless-stopped
      networks:
        - smart-home-network

    shopping-store:
      build: ./commerce/shopping-store
      container_name: shopping-store
      depends_on:
        discovery-server:
          condition: service_healthy
        config-server:
          condition: service_healthy
        postgres:
          condition: service_healthy
      ports:
        - "8083"
      environment:
        - SPRING_PROFILES_ACTIVE=default
        - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
        - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      restart: unless-stopped
      networks:
        - smart-home-network

    order:
      build: ./commerce/order
      container_name: order
      depends_on:
        discovery-server:
          condition: service_healthy
        config-server:
          condition: service_healthy
        postgres:
          condition: service_healthy
        warehouse:
          condition: service_started
        payment:
          condition: service_started
        delivery:
          condition: service_started
      ports:
        - "8084"
      environment:
        - SPRING_PROFILES_ACTIVE=default
        - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
        - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      restart: unless-stopped
      networks:
        - smart-home-network

    payment:
      build: ./commerce/payment
      container_name: payment
      depends_on:
        discovery-server:
          condition: service_healthy
        config-server:
          condition: service_healthy
        postgres:
          condition: service_healthy
        shopping-store:
          condition: service_started
      ports:
        - "8085"
      environment:
        - SPRING_PROFILES_ACTIVE=default
        - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
        - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      restart: unless-stopped
      networks:
        - smart-home-network

    delivery:
      build: ./commerce/delivery
      container_name: delivery
      depends_on:
        discovery-server:
          condition: service_healthy
        config-server:
          condition: service_healthy
        postgres:
          condition: service_healthy
        order:
          condition: service_started
        warehouse:
          condition: service_started
      ports:
        - "8086"
      environment:
        - SPRING_PROFILES_ACTIVE=default
        - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
        - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      restart: unless-stopped
      networks:
        - smart-home-network

    # ===== ТЕЛЕМЕТРИЯ (опционально) =====
    kafka:
      image: confluentinc/confluent-local:7.4.3
      hostname: kafka
      container_name: kafka
      ports:
        - "9092:9092"
        - "9101:9101"
      restart: unless-stopped
      environment:
        KAFKA_NODE_ID: 1
        KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
        KAFKA_JMX_PORT: 9101
        KAFKA_JMX_HOSTNAME: localhost
        KAFKA_PROCESS_ROLES: 'broker,controller'
        KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
        KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      networks:
        - smart-home-network

    kafka-init-topics:
      image: confluentinc/confluent-local:7.4.3
      container_name: kafka-init-topics
      depends_on:
        - kafka
      command: "bash -c \
                'kafka-topics --create --topic telemetry.sensors.v1 \
                             --partitions 1 --replication-factor 1 --if-not-exists \
                             --bootstrap-server kafka:29092 && \
                kafka-topics --create --topic telemetry.snapshots.v1 \
                             --partitions 1 --replication-factor 1 --if-not-exists \
                             --bootstrap-server kafka:29092 && \
                kafka-topics --create --topic telemetry.hubs.v1 \
                             --partitions 1 --replication-factor 1 --if-not-exists \
                             --bootstrap-server kafka:29092'"
      init: true
      networks:
        - smart-home-network

  volumes:
    postgres-data:

  networks:
    smart-home-network:
      driver: bridge