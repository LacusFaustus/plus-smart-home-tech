spring:
  application:
    name: warehouse
  cloud:
    config:
      enabled: true
      uri: http://config-server:8888

eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    preferIpAddress: true
    instance-id: ${spring.application.name}:${random.uuid}