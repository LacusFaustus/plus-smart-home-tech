spring:
  application:
    name: shopping-store
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    config:
      fail-fast: true

server:
  port: 0

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true
    instance-id: ${spring.application.name}:${random.uuid}