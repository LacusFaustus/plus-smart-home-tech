hub-router:
  # Все поля обязательны, в том числе поля с описаниями.
  test-stage:
    # Сцена описывает набор данных необходимый для начала теста
    # description - описание или название теста
    # device-map - содержит все хабы и подключенные к ним устройства, которые будут участвовать в тесте
    # user-scenarios - содержит пользовательские сценарии умного дома
    description: Проверка обработки событий от устройств и выполнения сценариев умного дома
    device-map: # карта устройств данной сцены
      # Карта состоит из набора хабов, установленных у пользователей
      # и списков устройств подключенных к этим хабам
      # hub-id - идентификатор хаба, установленного у пользователя
      # devices - список устройств установленных у пользователя и подключенных к хабу.
      - hub-id: hub-1
        devices:
        # Описание устройства состоит из двух полей:
        # идентификатора (id) и типа устройства (type).
        # Типы устройств:
        # MOTION_SENSOR, TEMPERATURE_SENSOR, LIGHT_SENSOR, CLIMATE_SENSOR, SWITCH_SENSOR
          - id: c7b8d4a1-8e37-4c1d-9130-5b0150e13954 # датчик движения
            type: MOTION_SENSOR
          - id: ed9e9587-4148-4fb5-81e0-61d072568628 # датчик освещенности
            type: LIGHT_SENSOR
          - id: 006b61ad-cac8-4adf-9dce-43892b5d060f # умный выключатель (освещения)
            type: SWITCH_SENSOR
          - id: 2b0bb4c1-7cf2-475a-a17c-e5cb6239d6e5 # датчик температуры и влажности
            type: CLIMATE_SENSOR
          - id: 0b9e1641-1a9f-4c43-9b24-6c3f0ccb000e # умная розетка
            type: SWITCH_SENSOR
      - hub-id: hub-2
        devices:
          - id: 14276dbc-d980-4dcc-853e-845ec38c5154 # умная кнопка
            type: SWITCH_SENSOR
          - id: b2ec7f40-9c46-4b0b-8ee1-12d0bebde5c1 # умная лампа
            type: SWITCH_SENSOR
          - id: 90811ee6-accb-401b-8442-8ec945bdaf29 # умная лампа
            type: SWITCH_SENSOR
          - id: f94d84a9-c9dd-41df-bbdc-70a8e609437b # умная лампа
            type: SWITCH_SENSOR
    user-scenarios: # сценарии умного дома, созданные пользователями
      - name: "Автосвет (коридор)"
        hub-id: "hub-1"
        conditions: # если
          # сработал датчик движения
          - sensor-id: c7b8d4a1-8e37-4c1d-9130-5b0150e13954
            type: "MOTION"
            operation: "EQUALS"
            value: 1
          # и уровень освещенности меньше 500 лк
          - sensor-id: ed9e9587-4148-4fb5-81e0-61d072568628
            type: "LUMINOSITY"
            operation: "LOWER_THAN"
            value: 500
        actions: # то
          # включить свет
          - sensor-id: 006b61ad-cac8-4adf-9dce-43892b5d060f
            type: "ACTIVATE"
            value:
      - name: "Регулировка температуры (спальня)"
        hub-id: "hub-1"
        conditions: # если
          # температура опустилась ниже 15 градусов
          - sensor-id: 2b0bb4c1-7cf2-475a-a17c-e5cb6239d6e5
            type: "TEMPERATURE"
            operation: "LOWER_THAN"
            value: 15
        actions: # то
          # включить умную розетку, в которую включен обогреватель
          - sensor-id: 0b9e1641-1a9f-4c43-9b24-6c3f0ccb000e
            type: "ACTIVATE"
            value: ""
      - name: "Выключить весь свет"
        hub-id: "hub-2"
        conditions: # если
          # нажата умная кнопка у выхода
          - sensor-id: 14276dbc-d980-4dcc-853e-845ec38c5154
            type: "SWITCH"
            operation: "EQUALS"
            value: 1
        actions: # то
          # выключить свет в спальне
          - sensor-id: b2ec7f40-9c46-4b0b-8ee1-12d0bebde5c1
            type: "DEACTIVATE"
            value: ""
          # выключить свет на кухне
          - sensor-id: 90811ee6-accb-401b-8442-8ec945bdaf29
            type: "DEACTIVATE"
            value: ""
          # выключить свет в коридоре
          - sensor-id: f94d84a9-c9dd-41df-bbdc-70a8e609437b
            type: "DEACTIVATE"
            value: ""