syntax = "proto3";

package telemetry.message.event;

import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_package = "ru.yandex.practicum.grpc.telemetry.event";

message HubEvent {
  bytes hub_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  oneof payload {
    DeviceAdded device_added = 3;
    DeviceRemoved device_removed = 4;
    ScenarioAdded scenario_added = 5;
    ScenarioRemoved scenario_removed = 6;
  }
}

message DeviceAdded {
  bytes id = 1;
  DeviceType type = 2;
}

message DeviceRemoved {
  bytes id = 1;
}

message ScenarioAdded {
  string name = 1;
  repeated ScenarioCondition conditions = 2;
  repeated DeviceAction actions = 3;
}

message ScenarioRemoved {
  string name = 1;
}

message ScenarioCondition {
  bytes sensor_id = 1;
  ConditionType type = 2;
  ConditionOperation operation = 3;
  optional int32 value = 4;
}

message DeviceAction {
  bytes sensor_id = 1;
  ActionType type = 2;
  optional int32 value = 3;
}

message DeviceActionRequest {
  string hub_id = 1;
  string scenario_name = 2;
  DeviceAction action = 3;
  google.protobuf.Timestamp timestamp = 4;
}

enum DeviceType {
  MOTION_SENSOR = 0;
  TEMPERATURE_SENSOR = 1;
  LIGHT_SENSOR = 2;
  CLIMATE_SENSOR = 3;
  SWITCH_SENSOR = 4;
}

enum ConditionType {
  MOTION = 0;
  LUMINOSITY = 1;
  SWITCH = 2;
  TEMPERATURE = 3;
  CO2LEVEL = 4;
  HUMIDITY = 5;
}

enum ConditionOperation {
  EQUALS = 0;
  GREATER_THAN = 1;
  LOWER_THAN = 2;
}

enum ActionType {
  ACTIVATE = 0;
  DEACTIVATE = 1;
  INVERSE = 2;
  SET_VALUE = 3;
}