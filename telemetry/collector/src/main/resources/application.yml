grpc:
  server:
    port: 59091
    max-inbound-message-size: 10485760  # 10MB
    max-inbound-metadata-size: 1048576  # 1MB

spring:
  main:
    allow-bean-definition-overriding: true

kafka:
  bootstrap-servers: localhost:9092
  topics:
    sensors: telemetry.sensors.v1
    hubs: telemetry.hubs.v1

logging:
  level:
    ru.yandex.practicum: DEBUG