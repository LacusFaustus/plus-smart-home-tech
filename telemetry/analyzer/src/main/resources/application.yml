spring:
  application:
    name: analyzer
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/smart_home
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  sql:
    init:
      mode: always
      schema-locations: classpath:db/migration/V1__init_schema.sql

kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  topics:
    snapshots: telemetry.snapshots.v1
    hubs: telemetry.hubs.v1
  consumer:
    snapshot:
      group-id: analyzer-snapshot-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 10
    hub-event:
      group-id: analyzer-hub-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 100

grpc:
  client:
    hub-router:
      address: 'static://${HUB_ROUTER_HOST:localhost}:59090'
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext

logging:
  level:
    ru.yandex.practicum: INFO
    org.apache.kafka: WARN
    org.hibernate: WARN